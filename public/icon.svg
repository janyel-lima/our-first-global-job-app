<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @font-face {
        font-family: 'Orbitron';
        font-weight: 700;
        src: url(data:font/woff2;base64,) format('woff2');
      }
    </style>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#111a3d"/>
      <stop offset="100%" stop-color="#060814"/>
    </radialGradient>
    <linearGradient id="ringGrad" gradientUnits="userSpaceOnUse" x1="66" y1="246" x2="446" y2="246">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#22c1c3"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="textGrad" gradientUnits="userSpaceOnUse" x1="90" y1="258" x2="422" y2="258">
      <stop offset="0%" stop-color="#5b9bff"/>
      <stop offset="50%" stop-color="#2fd1c5"/>
      <stop offset="100%" stop-color="#34d17a"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bgGlow)"/>

  <g transform="rotate(-15 256 246)" opacity="0.85">
    <ellipse cx="256" cy="246" rx="190" ry="78" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" opacity="0.55"/>
    <ellipse cx="256" cy="246" rx="164" ry="66" fill="none" stroke="#8fb3ff" stroke-width="0.6" opacity="0.18"/>

    <g stroke="url(#ringGrad)" stroke-width="1.2" stroke-linecap="round">
      <line x1="446" y1="246" x2="462" y2="246"/>
      <line x1="66" y1="246" x2="50" y2="246"/>
      <line x1="256" y1="168" x2="256" y2="152"/>
      <line x1="256" y1="324" x2="256" y2="340"/>
    </g>

    <circle cx="401" cy="296" r="4" fill="#7dd3fc" filter="url(#glow)"/>
    <circle cx="78" cy="273" r="4" fill="#5eead4" filter="url(#glow)"/>
    <circle cx="289" cy="169" r="5.5" fill="#ffffff" filter="url(#glow)"/>
  </g>

  <text x="256" y="272" font-family="'Orbitron', 'Consolas', monospace" font-weight="700" font-size="80"
        fill="url(#textGrad)" text-anchor="middle" letter-spacing="6">OFGJ</text>
</svg>
